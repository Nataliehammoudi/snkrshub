<script>
  function render() {
    const lines = cartLines();
    const root = document.getElementById("cart-root");

    if (!lines.length) {
      root.innerHTML = `
        <div class="empty-state">
          <h2>Your cart is empty</h2>
          <p>Nothing here yet. Go find a pair worth walking in.</p>
          <a href="shop.html" class="btn btn-primary" style="margin-top:20px;">Browse Sneakers</a>
        </div>`;
      return;
    }

    const linesHTML = lines.map((line) => `
      <div class="cart-line">
        <img src="${line.color.images[0]}" alt="${line.product.name}">
        <div>
          <h4>${line.product.name}</h4>
          <div class="meta">${line.color.name} · Size ${line.size} · ${line.product.price} JOD each</div>
          <div class="qty-control" style="width:fit-content;">
            <button data-minus="${line.index}" aria-label="Decrease quantity">−</button>
            <span>${line.qty}</span>
            <button data-plus="${line.index}" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <div class="cart-line-actions">
          <span class="price">${line.lineTotal} JOD</span>
          <button class="remove-link" data-remove="${line.index}">Remove</button>
        </div>
      </div>
    `).join("");

    const subtotal = cartSubtotal();

    root.innerHTML = `
      <div class="cart-layout">
        <div>${linesHTML}</div>
        <div class="summary-box">
          <div class="summary-row"><span>Subtotal</span><span>${subtotal} JOD</span></div>
          <div class="summary-row"><span>Delivery</span><span>Calculated at checkout</span></div>
          <div class="summary-row total"><span>Total</span><span>${subtotal} JOD</span></div>
          <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:20px;">Proceed to Checkout</a>
          <a href="shop.html" class="btn btn-outline btn-block" style="margin-top:12px;">Keep Shopping</a>
        </div>
      </div>
    `;

    root.addEventListener("click", handleClick);
  }

  function handleClick(e) {
    const minus = e.target.closest("[data-minus]");
    const plus = e.target.closest("[data-plus]");
    const remove = e.target.closest("[data-remove]");
    const cart = getCart();

    if (minus) {
      const i = Number(minus.dataset.minus);
      updateCartQty(i, cart[i].qty - 1);
      render();
    }
    if (plus) {
      const i = Number(plus.dataset.plus);
      updateCartQty(i, cart[i].qty + 1);
      render();
    }
    if (remove) {
      removeFromCart(Number(remove.dataset.remove));
      render();
    }
  }

  render();
</script>
