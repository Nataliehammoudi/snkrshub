<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — SNKRS HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="info-bar">
    <div class="info-bar-track">
      <span>Free Exchange Within 3 Days</span>
      <span>Cash on Delivery · CliQ Accepted</span>
      <span>Amman, Jordan · Ships to Palestine</span>
    </div>
  </div>
  <div class="header-bar">
    <a href="index.html" class="logo">SNKRS<span class="dot">.</span>HUB</a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="cart-link active">Cart <span data-cart-count>0</span></a>
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div style="padding-top:48px;">
      <span class="eyebrow">Step 1 of 2</span>
      <h1 style="font-size:clamp(28px,4vw,40px); margin-top:8px;">Your Cart</h1>
    </div>
    <div id="cart-root"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 SNKRS HUB. All rights reserved.</span>
      <span>Where quality is what matters.</span>
    </div>
  </div>
</footer>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
  function render() {
    const lines = cartLines();
    const root = document.getElementById("cart-root");

    if (!lines.length) {
      root.innerHTML = `
        <div class="empty-state">
          <h2>Your cart is empty</h2>
          <p>Nothing here yet. Go find a pair worth walking in.</p>
          <a href="shop.html" class="btn btn-primary" style="margin-top:20px;">Browse Sneakers</a>
        </div>`;
      return;
    }

    const linesHTML = lines.map((line) => `
      <div class="cart-line">
        <img src="${line.color.images[0]}" alt="${line.product.name}">
        <div>
          <h4>${line.product.name}</h4>
          <div class="meta">${line.color.name} · Size ${line.size} · ${line.product.price} JOD each</div>
          <div class="qty-control" style="width:fit-content;">
            <button data-minus="${line.index}" aria-label="Decrease quantity">−</button>
            <span>${line.qty}</span>
            <button data-plus="${line.index}" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <div class="cart-line-actions">
          <span class="price">${line.lineTotal} JOD</span>
          <button class="remove-link" data-remove="${line.index}">Remove</button>
        </div>
      </div>
    `).join("");

    const subtotal = cartSubtotal();

    root.innerHTML = `
      <div class="cart-layout">
        <div>${linesHTML}</div>
        <div class="summary-box">
          <div class="summary-row"><span>Subtotal</span><span>${subtotal} JOD</span></div>
          <div class="summary-row"><span>Delivery</span><span>Calculated at checkout</span></div>
          <div class="summary-row total"><span>Total</span><span>${subtotal} JOD</span></div>
          <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:20px;">Proceed to Checkout</a>
          <a href="shop.html" class="btn btn-outline btn-block" style="margin-top:12px;">Keep Shopping</a>
        </div>
      </div>
    `;

    root.addEventListener("click", handleClick);
  }

  function handleClick(e) {
    const minus = e.target.closest("[data-minus]");
    const plus = e.target.closest("[data-plus]");
    const remove = e.target.closest("[data-remove]");
    const cart = getCart();

    if (minus) {
      const i = Number(minus.dataset.minus);
      updateCartQty(i, cart[i].qty - 1);
      render();
    }
    if (plus) {
      const i = Number(plus.dataset.plus);
      updateCartQty(i, cart[i].qty + 1);
      render();
    }
    if (remove) {
      removeFromCart(Number(remove.dataset.remove));
      render();
    }
  }

  render();
</script>
</body>
</html>
