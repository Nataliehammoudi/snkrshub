<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — SNKRS HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="info-bar">
    <div class="info-bar-track">
      <span>Free Exchange Within 3 Days</span>
      <span>Cash on Delivery · CliQ Accepted</span>
      <span>Amman, Jordan · Ships to Palestine</span>
    </div>
  </div>
  <div class="header-bar">
    <a href="index.html" class="logo">SNKRS<span class="dot">.</span>HUB</a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="cart-link">Cart <span data-cart-count>0</span></a>
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div style="padding-top:48px;">
      <span class="eyebrow">Step 2 of 2</span>
      <h1 style="font-size:clamp(28px,4vw,40px); margin-top:8px;">Checkout</h1>
    </div>
    <div id="checkout-root"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-bottom">
      <span>© 2026 SNKRS HUB. All rights reserved.</span>
      <span>Where quality is what matters.</span>
    </div>
  </div>
</footer>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
  // Edit this to the store's real WhatsApp number (country code, no plus, no spaces).
  const STORE_WHATSAPP = "962796383122";

  function render() {
    const lines = cartLines();
    const root = document.getElementById("checkout-root");

    if (!lines.length) {
      root.innerHTML = `
        <div class="empty-state">
          <h2>Nothing to check out</h2>
          <p>Your cart is empty right now.</p>
          <a href="shop.html" class="btn btn-primary" style="margin-top:20px;">Browse Sneakers</a>
        </div>`;
      return;
    }

    const subtotal = cartSubtotal();
    const summaryHTML = lines.map((l) => `
      <div class="summary-row"><span>${l.product.name} · ${l.color.name} · ${l.size} × ${l.qty}</span><span>${l.lineTotal} JOD</span></div>
    `).join("");

    root.innerHTML = `
      <div class="checkout-layout">
        <form id="checkout-form">
          <div class="form-group">
            <label for="name">Full name</label>
            <input id="name" type="text" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="phone">Phone number</label>
            <input id="phone" type="tel" required placeholder="07XXXXXXXX">
          </div>
          <div class="form-group">
            <label for="location">Delivery location</label>
            <textarea id="location" required placeholder="City, area, street, nearest landmark"></textarea>
          </div>

          <div class="form-group">
            <label>Payment method</label>
            <div class="pay-options">
              <label class="pay-option active" data-pay="cod">
                <input type="radio" name="payment" value="Cash on Delivery" checked>
                <span>
                  <strong>Cash on Delivery</strong>
                  <span>Pay in cash when your order arrives.</span>
                </span>
              </label>
              <label class="pay-option" data-pay="cliq">
                <input type="radio" name="payment" value="CliQ">
                <span>
                  <strong>CliQ</strong>
                  <span>Pay by CliQ transfer, details sent after you place the order.</span>
                </span>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Place Order</button>

          <div class="confirm-panel" id="confirm-panel">
            <h3>Order ready</h3>
            <p>Your order details are set. Send them to us on WhatsApp and we will confirm right away.</p>
            <a class="btn btn-primary" id="whatsapp-link" href="#" target="_blank" rel="noopener">Send Order on WhatsApp</a>
          </div>
        </form>

        <div class="summary-box">
          <h4 class="mono" style="text-transform:uppercase; letter-spacing:0.08em; font-size:12px; color:var(--grey); margin-bottom:16px;">Order Summary</h4>
          ${summaryHTML}
          <div class="summary-row total"><span>Total</span><span>${subtotal} JOD</span></div>
        </div>
      </div>
    `;

    document.querySelectorAll(".pay-option").forEach((opt) => {
      opt.addEventListener("click", () => {
        document.querySelectorAll(".pay-option").forEach((o) => o.classList.remove("active"));
        opt.classList.add("active");
        opt.querySelector("input").checked = true;
      });
    });

    document.getElementById("checkout-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const location = document.getElementById("location").value.trim();
      const payment = document.querySelector('input[name="payment"]:checked').value;

      const itemsText = lines
        .map((l) => `- ${l.product.name} (${l.color.name}, size ${l.size}) x${l.qty} — ${l.lineTotal} JOD`)
        .join("%0A");

      const message =
        `New order from SNKRS HUB site%0A%0A` +
        `Name: ${encodeURIComponent(name)}%0A` +
        `Phone: ${encodeURIComponent(phone)}%0A` +
        `Location: ${encodeURIComponent(location)}%0A` +
        `Payment: ${encodeURIComponent(payment)}%0A%0A` +
        `Items:%0A${itemsText}%0A%0A` +
        `Total: ${subtotal} JOD`;

      document.getElementById("whatsapp-link").href = `https://wa.me/${STORE_WHATSAPP}?text=${message}`;
      document.getElementById("confirm-panel").classList.add("visible");
      document.getElementById("confirm-panel").scrollIntoView({ behavior: "smooth", block: "center" });
    });
  }

  render();
</script>
</body>
</html>
