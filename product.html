<script>
  const params = new URLSearchParams(window.location.search);
  const product = getProduct(params.get("id")) || PRODUCTS[0];

  let state = {
    colorIndex: 0,
    imageIndex: 0,
    size: null,
    qty: 1
  };

  document.title = `${product.name} — SNKRS HUB`;

  function render() {
    const color = product.colors[state.colorIndex];
    const priceHTML = product.originalPrice
      ? `<span class="price">${product.price} JOD</span><span class="price-strike">${product.originalPrice} JOD</span>`
      : `<span class="price">${product.price} JOD</span>`;
    const badge = product.badge ? `<span class="product-badge ${product.badge.toLowerCase()}" style="position:static; display:inline-flex; margin-left:10px;">${product.badge}</span>` : "";

    const root = document.getElementById("product-root");
    root.innerHTML = `
      <div class="product-detail">
        <div>
          <div class="gallery-main">
            <img id="main-image" src="${color.images[state.imageIndex]}" alt="${product.name} in ${color.name}">
          </div>
          <div class="gallery-thumbs" id="gallery-thumbs">
            ${color.images.map((img, i) => `
              <button class="${i === state.imageIndex ? "active" : ""}" data-img="${i}" aria-label="View image ${i + 1}">
                <img src="${img}" alt="">
              </button>`).join("")}
          </div>
        </div>

        <div>
          <span class="eyebrow detail-eyebrow">${product.brand} · ${color.name}</span>
          <h1>${product.name}${badge}</h1>
          <div class="detail-price">${priceHTML}</div>
          <p class="detail-desc">${product.description}</p>

          <div class="option-block">
            <div class="option-label"><span>Colorway</span><span>${color.name}</span></div>
            <div class="color-options" id="color-options">
              ${product.colors.map((c, i) => `
                <button class="color-swatch ${i === state.colorIndex ? "active" : ""}" data-color="${i}" style="background:${c.hex}" aria-label="${c.name}" title="${c.name}"></button>`).join("")}
            </div>
          </div>

          <div class="option-block">
            <div class="option-label"><span>Size (EU)</span><span id="size-hint">${state.size ? state.size : "Select a size"}</span></div>
            <div class="size-options" id="size-options">
              ${product.sizes.map((s) => `<button class="size-chip ${state.size === s ? "active" : ""}" data-size="${s}">${s}</button>`).join("")}
            </div>
          </div>

          <div class="qty-row">
            <span class="option-label" style="margin:0;">Quantity</span>
            <div class="qty-control">
              <button id="qty-minus" aria-label="Decrease quantity">−</button>
              <span id="qty-value">${state.qty}</span>
              <button id="qty-plus" aria-label="Increase quantity">+</button>
            </div>
          </div>

          <div class="detail-actions">
            <button class="btn btn-primary" id="add-cart-btn">Add to Cart</button>
            <a href="cart.html" class="btn btn-outline">View Cart</a>
          </div>

          <p class="detail-note"><strong>Delivery:</strong> Cash on delivery or CliQ. Add your location at checkout. Free exchange within 3 days if the fit is off.</p>
        </div>
      </div>
    `;

    document.getElementById("gallery-thumbs").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state.imageIndex = Number(btn.dataset.img);
      render();
    });

    document.getElementById("color-options").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state.colorIndex = Number(btn.dataset.color);
      state.imageIndex = 0;
      render();
    });

    document.getElementById("size-options").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state.size = Number(btn.dataset.size);
      render();
    });

    document.getElementById("qty-minus").addEventListener("click", () => {
      state.qty = Math.max(1, state.qty - 1);
      render();
    });
    document.getElementById("qty-plus").addEventListener("click", () => {
      state.qty += 1;
      render();
    });

    document.getElementById("add-cart-btn").addEventListener("click", () => {
      if (!state.size) {
        document.getElementById("size-hint").style.color = "var(--copper)";
        document.getElementById("size-hint").textContent = "Pick a size first";
        return;
      }
      addToCart(product.id, color.name, state.size, state.qty);
      const btn = document.getElementById("add-cart-btn");
      btn.textContent = "Added ✓";
      setTimeout(() => { btn.textContent = "Add to Cart"; }, 1400);
    });
  }

  render();
</script>
